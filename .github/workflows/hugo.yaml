# Workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  HUGO_VERSION: '0.154.1'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: themes/pickles/pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            substituters = https://cache.nixos.org https://devenv.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= devenv.cachix.org-1:XVxkRQ/ScL7WeZ1XuLKR4X8RPgYSn6O4pFmsM5G7cPs=

      - name: Install Node dependencies
        run: |
          cd themes/pickles && pnpm install --frozen-lockfile

      - name: Build CSS
        run: |
          cd themes/pickles && pnpm exec sass-embedded assets/scss/style.scss:static/css/style.css --load-path=node_modules

      - name: Cache Hugo
        uses: actions/cache@v4
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: ${{ runner.os }}-hugo-${{ hashFiles('hugo.toml', 'themes/pickles/theme.toml') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          TZ: Europe/Zurich
        run: |
          nix-shell -p hugo pagefind --run "hugo --gc --minify --baseURL ${{ steps.pages.outputs.base_url }}/"

      - name: Index with Pagefind
        run: |
          nix-shell -p hugo pagefind --run "pagefind --site public"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
