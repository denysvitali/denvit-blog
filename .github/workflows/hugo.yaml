# Workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  HUGO_VERSION: '0.154.1'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_CACHEDIR: /tmp/hugo_cache
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Ensure generated outputs are not tracked
        run: |
          tracked="$(git ls-files 'public/**' 'resources/**' 'static/css/**' 'themes/pickles/static/css/**')"
          if [ -n "$tracked" ]; then
            echo "Generated files must not be tracked:"
            echo "$tracked"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install root Node dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            substituters = https://cache.nixos.org https://devenv.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= devenv.cachix.org-1:XVxkRQ/ScL7WeZ1XuLKR4X8RPgYSn6O4pFmsM5G7cPs=

      - name: Install Node dependencies
        run: |
          cd themes/pickles && pnpm install --frozen-lockfile

      - name: Expose theme JS dependencies to Hugo
        run: |
          mkdir -p "$PWD/node_modules"
          ln -sfn "$PWD/themes/pickles/node_modules/swiper" "$PWD/node_modules/swiper"
          ln -sfn "$PWD/themes/pickles/node_modules/zooming" "$PWD/node_modules/zooming"

      - name: Build CSS
        run: |
          cd themes/pickles && pnpm exec sass assets/scss/style.scss:static/css/style.css --load-path=node_modules --no-source-map

      - name: Cache Hugo
        uses: actions/cache@v4
        with:
          path: ${{ env.HUGO_CACHEDIR }}
          key: ${{ runner.os }}-hugo-${{ hashFiles('hugo.toml', 'themes/pickles/theme.toml') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ASSET_VERSION: ${{ github.sha }}
          TZ: Europe/Zurich
        run: |
          nix-shell -p hugo pagefind --run "hugo --gc --minify --baseURL ${{ steps.pages.outputs.base_url }}/"

      - name: Index with Pagefind
        run: |
          nix-shell -p hugo pagefind --run "pagefind --site public"

      - name: Visual smoke test
        run: npm run test:visual

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
